syntax = "proto3";

package port.gateway.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";

option go_package = "github.com/kyh0703/port-contracts/gen/go/port/gateway/v1;gatewayv1";

service GatewayDispatchService {
  rpc DispatchConversation(DispatchConversationRequest) returns (DispatchConversationResponse) {
    option (google.api.http) = {
      post: "/internal/v1/dispatches"
      body: "*"
    };
  }
}

message DispatchConversationRequest {
  string conversation_id = 1 [(buf.validate.field).string.min_len = 1];
  string session_id = 2 [(buf.validate.field).string.min_len = 1];
  string room_id = 3 [(buf.validate.field).string.min_len = 1];
  string media_signaling_url = 4 [(buf.validate.field).string.min_len = 1];
  ServiceTokens service_tokens = 5 [(buf.validate.field).required = true];
  Capabilities capabilities = 6 [(buf.validate.field).required = true];
  RecordingConfig recording = 7 [(buf.validate.field).required = true];
  string media_server_id = 8;
}

message ServiceTokens {
  ParticipantToken agent = 1;
  ParticipantToken recorder = 2;
}

message ParticipantToken {
  string participant_id = 1 [(buf.validate.field).string.min_len = 1];
  string token = 2 [(buf.validate.field).string.min_len = 1];
}

message Capabilities {
  bool attach_agent = 1;
  bool start_recording = 2;
}

message RecordingConfig {
  bool enabled = 1;
}

message DispatchConversationResponse {
  string conversation_id = 1 [(buf.validate.field).string.min_len = 1];
  string session_id = 2 [(buf.validate.field).string.min_len = 1];
  string room_id = 3 [(buf.validate.field).string.min_len = 1];
  string status = 4 [(buf.validate.field).string.min_len = 1];
}
