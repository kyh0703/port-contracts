syntax = "proto3";

package port.record.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";

option go_package = "github.com/kyh0703/port-contracts/gen/go/port/record/v1;recordv1";

service RecordingService {
  rpc FinalizeCall(FinalizeCallRequest) returns (FinalizeCallResponse) {
    option (google.api.http) = {
      post: "/api/recordings/finalize"
      body: "*"
    };
  }
}

message FinalizeCallRequest {
  string account_id = 1 [(buf.validate.field).string.min_len = 1];
  string call_id = 2 [(buf.validate.field).string.min_len = 1];
}

message FinalizeCallResponse {
  optional string recording_path = 1;
  int32 recording_size_kb = 2 [(buf.validate.field).int32.gte = 0];
  string recording_status = 3 [(buf.validate.field).string.min_len = 1];
}
